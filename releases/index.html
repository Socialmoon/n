<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Network App - APK Downloads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .apk-list {
            list-style: none;
        }
        
        .apk-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .apk-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        .apk-info {
            flex: 1;
        }
        
        .apk-name {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .apk-date {
            color: #999;
            font-size: 12px;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
            text-decoration: none;
            display: inline-block;
            margin-left: 20px;
            white-space: nowrap;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
        }
        
        .no-apks {
            color: #999;
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .version-info {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Police Network App</h1>
        <p class="subtitle">Available APK Downloads</p>
        
        <div class="version-info">
            ℹ️ Download the latest APK to install the Police Network App on your Android device.
        </div>
        
        <ul class="apk-list" id="apkList">
            <li class="no-apks">Loading APK list...</li>
        </ul>
    </div>
    
    <script>
        // Fetch and list APK files
        async function loadAPKs() {
            try {
                const response = await fetch('.');
                const html = await response.text();
                
                // Parse HTML to find APK files
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a[href$=".apk"]');
                
                if (links.length === 0) {
                    // Fallback: manually check for known APK pattern
                    const apkRegex = /app-release-(\d{8})\.apk/g;
                    const matches = html.matchAll(apkRegex);
                    const apks = Array.from(matches).map(m => ({
                        filename: m[0],
                        date: formatDate(m[1])
                    })).sort((a, b) => b.filename.localeCompare(a.filename));
                    
                    if (apks.length > 0) {
                        displayAPKs(apks);
                        return;
                    }
                }
                
                // Process found links
                const apks = Array.from(links)
                    .map(link => ({
                        filename: link.innerText || link.getAttribute('href'),
                        url: link.getAttribute('href')
                    }))
                    .filter(apk => apk.filename.endsWith('.apk') && !apk.filename.includes('index.html'))
                    .sort((a, b) => b.filename.localeCompare(a.filename));
                
                if (apks.length > 0) {
                    displayAPKs(apks);
                } else {
                    document.getElementById('apkList').innerHTML = '<li class="no-apks">No APK files found</li>';
                }
            } catch (error) {
                console.error('Error loading APKs:', error);
                document.getElementById('apkList').innerHTML = '<li class="no-apks">Error loading APK list</li>';
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return '';
            const year = dateStr.substring(0, 4);
            const month = dateStr.substring(4, 6);
            const day = dateStr.substring(6, 8);
            return new Date(year, month - 1, day).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        function displayAPKs(apks) {
            const list = document.getElementById('apkList');
            
            if (apks.length === 0) {
                list.innerHTML = '<li class="no-apks">No APK files found</li>';
                return;
            }
            
            list.innerHTML = apks.map(apk => {
                const dateMatch = apk.filename.match(/app-release-(\d{8})/);
                const date = dateMatch ? formatDate(dateMatch[1]) : 'Unknown date';
                const url = apk.url || apk.filename;
                
                return `
                    <li class="apk-item">
                        <div class="apk-info">
                            <div class="apk-name">${apk.filename}</div>
                            <div class="apk-date">Released: ${date}</div>
                        </div>
                        <a href="${url}" class="download-btn">Download</a>
                    </li>
                `;
            }).join('');
        }
        
        // Load APKs on page load
        document.addEventListener('DOMContentLoaded', loadAPKs);
    </script>
</body>
</html>
