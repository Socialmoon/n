name: Publish APK Release

on:
  push:
    branches:
      - master
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Prepare release metadata
        id: meta
        run: |
          TAG="apk-$(date +%Y%m%d-%H%M%S)"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          RELEASE_APK="app-release-${TAG}.apk"

          test -f "$APK_PATH"
          cp "$APK_PATH" "$RELEASE_APK"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=$RELEASE_APK" >> "$GITHUB_OUTPUT"

      - name: Verify APK artifact exists
        run: |
          ls -lah
          test -f "${{ steps.meta.outputs.asset }}"

      - name: Create GitHub Release and upload APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.asset }}" \
            --title "APK ${{ steps.meta.outputs.tag }}" \
            --generate-notes \
            --latest
