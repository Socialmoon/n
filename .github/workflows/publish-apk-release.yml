name: Publish APK Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-apk-release
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'avinash5020'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Build APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CDN_BASE_URL: ${{ secrets.CLOUDFLARE_CDN_BASE_URL }}
        run: |
          flutter pub get
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"
          test -n "$CDN_BASE_URL"
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=CDN_BASE_URL="$CDN_BASE_URL"

      - name: Prepare release metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          SAFE_VERSION="$(echo "$APP_VERSION" | tr '+' '-')"
          RELEASE_APK="apne-saathi-v${SAFE_VERSION}.apk"
          TAG="v${APP_VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            TAG="v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}"
          fi

          test -f "$APK_PATH"
          cp "$APK_PATH" "$RELEASE_APK"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=$RELEASE_APK" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify APK artifact exists
        run: |
          ls -lah
          test -f "${{ steps.meta.outputs.asset }}"

      - name: Create GitHub Release and upload APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.asset }}" \
            --title "Apne Saathi v${{ steps.meta.outputs.version }}" \
            --generate-notes \
            --latest
