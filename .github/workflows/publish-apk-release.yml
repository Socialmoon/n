name: Publish APK Release

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify APK artifacts exist
        run: |
          ls -lah releases || true
          test -n "$(ls -1 releases/*.apk 2>/dev/null)"

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: APK ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: releases/*.apk
