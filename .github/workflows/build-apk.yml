name: Build APK

on:
  workflow_dispatch:
    inputs:
      apk_version:
        description: 'Version string to include in filename (e.g. 0.1.5)'
        required: false
      upload_to_r2:
        description: 'Set to true to upload built APKs to Cloudflare R2 (requires secrets)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK (split per ABI)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CDN_BASE_URL: ${{ secrets.CLOUDFLARE_CDN_BASE_URL }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"
          test -n "$CDN_BASE_URL"
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=CDN_BASE_URL="$CDN_BASE_URL"

      - name: Collect APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Optional: Upload APKs to Cloudflare R2 (S3 compatible)
        if: ${{ github.event.inputs.upload_to_r2 == 'true' }}
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }} # e.g. https://<account>.r2.cloudflarestorage.com
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          APK_VERSION: ${{ github.event.inputs.apk_version }}
        run: |
          python3 -m pip install --upgrade awscli
          set -e
          mkdir -p r2upload
          for f in build/app/outputs/flutter-apk/*.apk; do
            base=$(basename "$f")
            if [ -n "$APK_VERSION" ]; then
              dst="apne-saathi-${APK_VERSION}-${base}"
            else
              dst="apne-saathi-${base}"
            fi
            AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
              aws --endpoint-url "$R2_ENDPOINT" s3 cp "$f" "s3://$R2_BUCKET/$dst" --acl public-read
            echo "https://${R2_ENDPOINT#https://}/$R2_BUCKET/$dst"
          done

      - name: Optional: Update Supabase `app_settings` with fallback URL
        if: ${{ github.event.inputs.upload_to_r2 == 'true' && secrets.SUPABASE_SERVICE_ROLE }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          APK_VERSION: ${{ github.event.inputs.apk_version }}
        run: |
          # This step will upsert app_download_fallback_url to the first uploaded APK's public URL.
          if [ -n "$APK_VERSION" ]; then
            filename="apne-saathi-${APK_VERSION}-app-arm64-v8a-release.apk"
          else
            filename=$(basename build/app/outputs/flutter-apk/app-arm64-v8a-release.apk)
          fi
          public_url="${R2_ENDPOINT%/}/$R2_BUCKET/$filename"
          echo "Setting fallback URL to: $public_url"
          curl -s -X POST "$SUPABASE_URL/rest/v1/app_settings" \
            -H "apikey: $SUPABASE_SERVICE_ROLE" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            --data-raw "[{ \"key\": \"app_download_fallback_url\", \"value\": \"$public_url\" }]"
