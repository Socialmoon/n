name: Build and Deploy APK to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'releases/index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp releases/index.html deploy/
          cp build/app/outputs/flutter-apk/app-release.apk deploy/app-release-$(date +%Y%m%d).apk
          ls -lah deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
